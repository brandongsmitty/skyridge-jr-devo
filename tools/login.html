<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Skyridge Jr Devo</title>
<link rel="icon" href="../assets/images/skyridge_jr-devo_logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/shared.css">
<script src="../assets/js/theme.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<style>
  :root {
    --orange:      #F26A1B;
    --black:       #111111;
    --gray-dark:   #1A1A1A;
    --gray-mid:    #888888;
    --gray-line:   rgba(255,255,255,0.08);
    --white:       #F5F0EB;
    --red:         #C0392B;
  }
  [data-theme="light"] {
    --orange:      #D95E18;
    --black:       #F5F0EB;
    --gray-dark:   #FFFFFF;
    --gray-mid:    #666666;
    --gray-line:   #E4E0DA;
    --white:       #111111;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .login-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--gray-dark);
    border: 1px solid var(--gray-line);
    border-radius: 8px;
    padding: 40px 36px;
    text-align: center;
  }

  .login-logo {
    height: 52px;
    width: auto;
    margin-bottom: 24px;
  }

  .login-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
  }

  .login-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--white);
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 13px;
    color: var(--gray-mid);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .google-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px 20px;
    background: var(--orange);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .google-btn:hover { background: #d95a14; }
  .google-btn:disabled {
    opacity: 0.6;
    cursor: default;
  }

  .google-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .login-error {
    margin-top: 16px;
    padding: 10px 14px;
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.4);
    border-radius: 4px;
    color: #e57373;
    font-size: 13px;
    text-align: left;
    display: none;
  }
  .login-error.visible { display: block; }

  .login-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--gray-line);
    font-size: 12px;
    color: var(--gray-mid);
  }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="../index.html" class="site-nav-brand">
      <img src="../assets/images/skyridge_jr-devo_logo.png" alt="" class="site-nav-logo">
      Skyridge Jr Devo
    </a>
  </div>
</nav>

<div class="login-body">
  <div class="login-card">
    <img src="../assets/images/skyridge_jr-devo_logo.png" alt="Skyridge Jr Devo" class="login-logo">

    <div class="login-eyebrow">Skyridge Jr Devo</div>
    <h1 class="login-title">Coach Tools</h1>
    <p class="login-sub">Sign in with your Google account to access the meeting and tracker tools.</p>

    <button class="google-btn" id="google-btn">
      <!-- Google "G" logo -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="rgba(255,255,255,0.85)" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="rgba(255,255,255,0.7)" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="rgba(255,255,255,0.9)" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="login-error" id="error-msg"></div>

    <div class="login-footer">
      Access is restricted to authorized Skyridge Jr Devo coaches.
    </div>
  </div>
</div>

<script>
  (function () {
    'use strict';

    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }

    const params  = new URLSearchParams(window.location.search);
    const returnTo = params.get('return') || 'tracker.html';

    // If already signed in, go straight to the destination.
    firebase.auth().onAuthStateChanged(function (user) {
      if (user) {
        window.location.replace(returnTo);
      }
    });

    const btn      = document.getElementById('google-btn');
    const errorBox = document.getElementById('error-msg');

    btn.addEventListener('click', function () {
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errorBox.classList.remove('visible');

      var provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider).catch(function (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('visible');
        btn.disabled = false;
        btn.innerHTML = [
          '<svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;flex-shrink:0">',
          '<path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>',
          '<path fill="rgba(255,255,255,0.85)" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>',
          '<path fill="rgba(255,255,255,0.7)" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>',
          '<path fill="rgba(255,255,255,0.9)" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>',
          '</svg>',
          'Sign in with Google'
        ].join('');
      });
    });
  })();
</script>
</body>
</html>
